task_id: QAB08
title: Check whether a three-qubit correlated state produces only the expected aligned outcomes
family: basic_behavior
property_type: distribution
qubit_count: 3
shots: 1024
llm_source_line_count: 21
circuit_gate_count: 3
program_entry: program.py:PROGRAM
gold_entry: gold.py:evaluate_gold_assertion
gold_compare_mode: hybrid
gold_metadata:
  required_substrings:
  - assert not unexpected_outcomes
  - assert counts.get("000", 0) > 0 and counts.get("111", 0) > 0
  optional_substrings:
  - ratio_000 = counts.get("000", 0) / shots
  - ratio_111 = counts.get("111", 0) / shots
  - assert abs(ratio_000 - ratio_111) < 0.1
fault_variants:
- id: broken_correlation
  path: faults/faulty_program.py
  entry: PROGRAM
insertion_mode: assertion_block
prompt_file: prompt.md
